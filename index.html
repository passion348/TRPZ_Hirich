<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вгадай число</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Вгадай число</h1>
    <p>Я загадав число від 1 до 100</p>

    <input type="number" id="guess" placeholder="Твоє число">
    <button onclick="checkGuess()">Перевірити</button>

    <p id="message"></p>
    <p id="attempts"></p>

    <button onclick="resetGame()">Зіграти ще</button>
  </div>

  <button id="infobtn">i</button>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="closebtn">&times;</span>
      <h2>Гра "Guess the number"</h2>
      <p>Спробуйте вгадати число від 1 до 100 за 5 спроб</p>
      <p>Розроблено в рамках практики з ТРПЗ, студентом 34 групи 121 спеціальності.</p>
      <p>© 2026 Гіріч Євгеній</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
